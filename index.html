<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX®-2026 | AUDIO-VISUAL ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500&display=swap');
        :root { --accent: #00ff66; }
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        h1, h2 { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-container { width: 150px; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        #enter-btn { margin-top: 30px; padding: 12px 30px; border: 1px solid rgba(255,255,255,0.1); color: #fff; opacity: 0; pointer-events: none; transition: 0.6s; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; font-size: 10px; }
        #enter-btn.active { opacity: 1; pointer-events: auto; border-color: var(--accent); color: var(--accent); }
        .video-interactive-wrapper { transform-style: preserve-3d; will-change: transform; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .scanline-mask { position: absolute; inset: 0; z-index: 10; pointer-events: none; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,0,0.03)); background-size: 100% 3px, 2px 100%; opacity: 0.4; }
        .masonry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); grid-auto-rows: 10px; gap: 30px; }
        @media (max-width: 768px) { .masonry-grid { grid-template-columns: 1fr; gap: 20px; } #cursor { display: none !important; } }
        .work-item { position: relative; overflow: hidden; border-radius: 4px; background: #111; cursor: pointer; transform-style: preserve-3d; }
        .work-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .work-item:hover img { filter: grayscale(0%); transform: scale(1.05); }
        #cursor { position: fixed; width: 12px; height: 12px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        .magnetic-text { display: inline-block; }
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; opacity: 0; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 60px 20px; }
    </style>
</head>
<body>
    <audio id="bgm" loop src="./enough.mp3" preload="auto"></audio>
    <div id="cursor"></div>
    <div id="loader">
        <div id="loader-status" class="mb-4 tracking-[0.4em] text-[9px] opacity-40">SYSTEM.CONNECTING</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <button id="enter-btn">ENTER ARCHIVE</button>
    </div>
    <div id="lightbox">
        <div id="close-lightbox" class="fixed top-10 right-10 text-[10px] tracking-widest cursor-pointer z-[2100] border border-white/20 p-2">CLOSE [X]</div>
        <img id="lightbox-img" class="w-full max-w-5xl" src="">
    </div>
    <canvas id="bg-canvas"></canvas>
    <nav class="fixed top-0 w-full p-8 md:p-12 flex justify-between items-center z-50 mix-blend-difference">
        <div class="text-xl font-bold tracking-tighter">VX®-2026</div>
    </nav>
    <main id="main">
        <section class="min-h-screen flex flex-col md:flex-row items-center justify-center md:justify-between px-8 md:px-20 pt-24 md:pt-0">
            <div class="z-20 mb-12 md:mb-0 text-center md:text-left">
                <h1 class="text-[14vw] md:text-[9vw] leading-[0.85] font-bold tracking-tighter">
                    <span class="magnetic-text">AUDIO</span><br>
                    <span class="magnetic-text md:ml-[10vw]" style="-webkit-text-stroke: 1px #fff; color: transparent;">VISUAL</span><br>
                    <span class="magnetic-text">LAB®</span>
                </h1>
            </div>
            <div class="video-interactive-wrapper relative w-full md:w-[42vw] aspect-video border border-white/10 overflow-hidden bg-neutral-900 group">
                <div class="scanline-mask"></div>
                <video id="hero-video" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 scale-110" autoplay muted loop playsinline src="./video.mp4"></video>
                <div class="absolute bottom-4 left-4 text-[7px] tracking-[0.5em] opacity-30 z-20">ENOUGH_FOR_ME // DATA_STREAM</div>
            </div>
        </section>

        <section class="px-8 md:px-20 py-24 border-t border-white/5">
            <h2 class="text-[10px] mb-16 opacity-30 tracking-[0.6em]">COLLECTED_WORKS</h2>
            <div class="masonry-grid" id="portfolio">
                <div class="work-item" style="grid-row-end: span 32;" data-full="./images/1.jpg"><img src="./images/1.jpg"></div>
                <div class="work-item" style="grid-row-end: span 48;" data-full="./images/2.jpg"><img src="./images/2.jpg"></div>
                <div class="work-item" style="grid-row-end: span 28;" data-full="./images/3.jpg"><img src="./images/3.jpg"></div>
                <div class="work-item" style="grid-row-end: span 41;" data-full="./images/4.jpg"><img src="./images/4.jpg"></div>
                <div class="work-item" style="grid-row-end: span 50;" data-full="./images/5.jpg"><img src="./images/5.jpg"></div>
                <div class="work-item" style="grid-row-end: span 35;" data-full="./images/6.jpg"><img src="./images/6.jpg"></div>
                <div class="work-item" style="grid-row-end: span 44;" data-full="./images/7.jpg"><img src="./images/7.jpg"></div>
                <div class="work-item" style="grid-row-end: span 29;" data-full="./images/8.jpg"><img src="./images/8.jpg"></div>
                <div class="work-item" style="grid-row-end: span 47;" data-full="./images/9.jpg"><img src="./images/9.jpg"></div>
                <div class="work-item" style="grid-row-end: span 33;" data-full="./images/10.jpg"><img src="./images/10.jpg"></div>
                <div class="work-item" style="grid-row-end: span 39;" data-full="./images/11.jpg"><img src="./images/11.jpg"></div>
                <div class="work-item" style="grid-row-end: span 26;" data-full="./images/12.jpg"><img src="./images/12.jpg"></div>
                <div class="work-item" style="grid-row-end: span 45;" data-full="./images/13.jpg"><img src="./images/13.jpg"></div>
                <div class="work-item" style="grid-row-end: span 31;" data-full="./images/14.jpg"><img src="./images/14.jpg"></div>
                <div class="work-item" style="grid-row-end: span 42;" data-full="./images/15.jpg"><img src="./images/15.jpg"></div>
                <div class="work-item" style="grid-row-end: span 37;" data-full="./images/16.jpg"><img src="./images/16.jpg"></div>
                <div class="work-item" style="grid-row-end: span 49;" data-full="./images/17.jpg"><img src="./images/17.jpg"></div>
                <div class="work-item" style="grid-row-end: span 27;" data-full="./images/18.jpg"><img src="./images/18.jpg"></div>
                <div class="work-item" style="grid-row-end: span 34;" data-full="./images/19.jpg"><img src="./images/19.jpg"></div>
                <div class="work-item" style="grid-row-end: span 46;" data-full="./images/20.jpg"><img src="./images/20.jpg"></div>
            </div>
        </section>
    </main>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const cursor = document.getElementById('cursor');
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                gsap.to(cursor, { x: e.clientX-6, y: e.clientY-6, duration: 0.4, ease: 'power2.out' });
            });
        }

        const audio = document.getElementById('bgm');
        const enterBtn = document.getElementById('enter-btn');
        
        gsap.to('.progress-bar', {
            width: '100%', duration: 3.5,
            onComplete: () => {
                document.getElementById('loader-status').innerText = "SYSTEM READY";
                enterBtn.classList.add('active');
            }
        });

        enterBtn.addEventListener('click', () => {
            audio.muted = false;
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    audio.volume = 0;
                    gsap.to(audio, { volume: 0.5, duration: 4, ease: "power1.in" });
                }).catch(err => console.log("音频未加载，继续运行网页"));
            }

            gsap.to('#loader', { y: '-100%', duration: 1.5, ease: 'expo.inOut' });
            gsap.from('.magnetic-text', { y: 100, stagger: 0.1, duration: 1.5, ease: 'expo.out', delay: 0.5 });
            document.body.style.overflowY = 'auto';
        });

        const videoWrapper = document.querySelector('.video-interactive-wrapper');
        if(videoWrapper) {
            videoWrapper.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = videoWrapper.getBoundingClientRect();
                const x = (e.clientX - left) / width - 0.5;
                const y = (e.clientY - top) / height - 0.5;
                gsap.to(videoWrapper, { rotationY: x * 25, rotationX: -y * 25, transformPerspective: 1000, duration: 0.5 });
                gsap.to("#hero-video", { x: -x * 30, y: -y * 30, scale: 1.2, duration: 0.5 });
            });
            videoWrapper.addEventListener('mouseleave', () => {
                gsap.to(videoWrapper, { rotationX: 0, rotationY: 0, duration: 1, ease: 'elastic.out(1, 0.3)' });
                gsap.to("#hero-video", { x: 0, y: 0, scale: 1.1, duration: 1 });
            });
        }

        document.querySelectorAll('.magnetic-text').forEach(text => {
            text.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = text.getBoundingClientRect();
                const x = (e.clientX - (left + width / 2)) * 0.4;
                const y = (e.clientY - (top + height / 2)) * 0.4;
                gsap.to(text, { x: x, y: y, duration: 0.3 });
                gsap.to(cursor, { scale: 5 });
            });
            text.addEventListener('mouseleave', () => {
                gsap.to(text, { x: 0, y: 0, duration: 0.6, ease: 'elastic.out(1, 0.3)' });
                gsap.to(cursor, { scale: 1 });
            });
        });

        const lightbox = document.getElementById('lightbox');
        document.querySelectorAll('.work-item').forEach(item => {
            item.addEventListener('click', () => {
                const fullImg = item.getAttribute('data-full');
                document.getElementById('lightbox-img').src = fullImg;
                lightbox.style.display = 'flex';
                gsap.to(lightbox, { opacity: 1, duration: 0.5 });
                lenis.stop();
            });
        });
        document.getElementById('close-lightbox').addEventListener('click', () => {
            gsap.to(lightbox, { opacity: 0, duration: 0.4, onComplete: () => { lightbox.style.display='none'; lenis.start(); }});
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = [];
        for(let i=0; i<60; i++) p.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*0.8});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(255,255,255,0.2)";
            p.forEach(i => { i.y -= 0.15; if(i.y<0) i.y=canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
